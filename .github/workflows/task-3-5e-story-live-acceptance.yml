name: Story Pipeline Live Acceptance

# Manual-only: this exercises real Gemini calls (spends real API quota)
# and a disposable Postgres service container, never the production
# database. Trigger from Actions -> this workflow -> Run workflow.
#
# acceptance_suite selects which stage's real-Gemini acceptance runs:
#   directions      -- Task 3.5E: executeDirectionsGeneration only.
#   outline_scripts -- Task 3.6: Outline -> Outline Lock -> Scripts ->
#                       Script Lock, against an existing (not
#                       regenerated) Integrated Direction fixture.
# Every other step (migrations, core/provider/api/worker/migration
# tests) always runs regardless of which suite is selected -- none of
# those touch Gemini or spend API quota.
on:
  workflow_dispatch:
    inputs:
      acceptance_suite:
        description: "Which live-Gemini acceptance suite to run"
        required: true
        type: choice
        options:
          - directions
          - outline_scripts
        default: directions

permissions:
  contents: read

jobs:
  live-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dc2100_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dc2100_ci
      STORY_LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      STORY_GEMINI_MODEL: ${{ secrets.STORY_GEMINI_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations 001-016 against a real, disposable Postgres
        run: node scripts/ci-run-migrations.js

      - name: Migration 015 real-Postgres acceptance (constraints, uniqueness, rollback)
        run: node scripts/ci-migration-accept.js

      - name: Story core tests
        run: npm run test:story-core

      - name: Story provider tests
        run: npm run test:story-provider

      - name: Story API tests
        run: npm run test:story-api

      - name: Story worker tests
        run: npm run test:story-worker

      - name: Story migration tests (pg-mem)
        run: npm run test:story-migration

      - name: Live Gemini acceptance via executeDirectionsGeneration (real network calls)
        if: ${{ github.event.inputs.acceptance_suite == 'directions' }}
        run: node scripts/live-accept-story-directions.js

      - name: Live Gemini acceptance for Outline/Script (Task 3.6, real network calls)
        if: ${{ github.event.inputs.acceptance_suite == 'outline_scripts' }}
        run: node scripts/live-accept-story-outline-scripts.js
