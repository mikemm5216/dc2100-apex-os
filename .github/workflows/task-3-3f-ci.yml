name: Task 3.3F CI

on:
  workflow_dispatch:
  push:
    branches:
      - feat/task-3-3f-signal-fusion
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: task-3-3f-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/dashboard/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Fusion core tests
        run: npm run test:fusion-core

      - name: Fusion worker tests
        run: npm run test:fusion-worker

      - name: Fusion API tests
        run: npm run test:fusion-api

      - name: Install Dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Dashboard lint
        working-directory: apps/dashboard
        run: npm run lint

      - name: Dashboard TypeScript
        working-directory: apps/dashboard
        run: npx tsc --noEmit

      - name: Dashboard production build
        working-directory: apps/dashboard
        run: npm run build
